<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff6eb4;
    --purple: #9b59b6;
    --gold: #f7c948;
    --coral: #ff7675;
    --mint: #55efc4;
  }

  body {
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
  }

  /* ===== STEP 1 ===== */
  #step1 {
    background: linear-gradient(135deg, #1a0030 0%, #3b0068 30%, #6b21a8 60%, #be185d 100%);
    overflow: hidden;
  }

  /* Aurora blobs */
  .aurora {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    pointer-events: none;
    animation: aurora-drift ease-in-out infinite alternate;
  }
  .aurora-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #ff6eb4 0%, #c026d3 60%, transparent 80%);
    top: -120px; left: -100px;
    animation-duration: 7s;
  }
  .aurora-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #7c3aed 0%, #2563eb 60%, transparent 80%);
    bottom: -100px; right: -80px;
    animation-duration: 9s;
    animation-delay: -3s;
  }
  .aurora-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #f59e0b 0%, #ec4899 60%, transparent 80%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 11s;
    animation-delay: -5s;
    opacity: 0.35;
  }
  .aurora-4 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, #06b6d4 0%, #8b5cf6 60%, transparent 80%);
    top: 60%; left: 10%;
    animation-duration: 8s;
    animation-delay: -2s;
    opacity: 0.4;
  }
  @keyframes aurora-drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.12); }
  }

  /* Step1 floating stars */
  .s1-star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    animation: s1-twinkle ease-in-out infinite alternate;
  }
  @keyframes s1-twinkle {
    from { opacity: 0.1; transform: scale(0.7); }
    to   { opacity: 1;   transform: scale(1.4); }
  }

  /* Step1 floating emoji */
  .s1-emoji {
    position: absolute;
    pointer-events: none;
    font-size: 1.6rem;
    animation: s1-float linear infinite;
    opacity: 0.75;
  }
  @keyframes s1-float {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.75; }
    95%  { opacity: 0.75; }
    100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
  }

  /* Step1 sparkle rings */
  .s1-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    pointer-events: none;
    animation: s1-ring-expand ease-out infinite;
  }
  @keyframes s1-ring-expand {
    0%   { transform: scale(0.2); opacity: 0.8; }
    100% { transform: scale(3);   opacity: 0; }
  }

  /* Step1 shooting star */
  .s1-shoot {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, transparent, #fff, rgba(255,255,255,0.6), transparent);
    border-radius: 2px;
    pointer-events: none;
    animation: s1-shoot-move linear infinite;
  }
  @keyframes s1-shoot-move {
    0%   { transform: translateX(-200px) translateY(0) rotate(-30deg); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateX(120vw) translateY(100px) rotate(-30deg); opacity: 0; }
  }

  /* Mesh grid overlay */
  #step1::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  #s1-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  /* Make card sit above the bg layers */
  .step1-card {
    position: relative;
    z-index: 10;
  }

  .step1-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 32px;
    padding: 3rem 3.5rem;
    text-align: center;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.2), 0 0 80px rgba(192,38,211,0.25);
    max-width: 420px;
    width: 90%;
    position: relative;
    z-index: 10;
  }

  .surprise-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    color: #fff;
    text-shadow: 0 0 30px rgba(255,180,240,0.9), 0 0 60px rgba(200,100,255,0.5);
    animation: glow-pulse 2s ease-in-out infinite alternate;
    margin-bottom: 2rem;
    line-height: 1.3;
  }

  @keyframes glow-pulse {
    from { text-shadow: 0 0 20px rgba(255,180,240,0.8), 0 0 40px rgba(200,100,255,0.4); }
    to   { text-shadow: 0 0 40px rgba(255,150,255,1),   0 0 80px rgba(180,80,255,0.7), 0 0 120px rgba(255,100,200,0.3); }
  }

  .name-input {
    width: 100%;
    padding: 1rem 1.4rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12);
    font-family: 'Quicksand', sans-serif;
    font-size: 1.1rem;
    color: #fff;
    outline: none;
    text-align: center;
    transition: all 0.3s;
    margin-bottom: 1.4rem;
  }
  .name-input::placeholder { color: rgba(255,200,255,0.55); }
  .name-input:focus {
    border-color: #e879f9;
    background: rgba(255,255,255,0.18);
    box-shadow: 0 0 0 4px rgba(232,121,249,0.2), 0 0 20px rgba(232,121,249,0.3);
  }

  .lets-go-btn {
    background: linear-gradient(135deg, #ff6eb4, #c061e8, #7c3aed);
    color: #fff;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 25px rgba(180,80,255,0.5);
    letter-spacing: 0.5px;
  }
  .lets-go-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent 0%, rgba(255,255,255,0.3) 10%, transparent 20%);
    animation: shimmer-spin 3s linear infinite;
  }
  @keyframes shimmer-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .lets-go-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(180,80,255,0.6); }
  .lets-go-btn:active { transform: translateY(0); }

  /* ===== STEP 2 ===== */
  #step2 { background: linear-gradient(160deg, #1a0030 0%, #3d0066 40%, #1a0040 100%); }

  .invite-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: #ffcef5;
    text-shadow: 0 0 20px rgba(255,150,255,0.8), 0 0 50px rgba(200,80,255,0.5);
    text-align: center;
    margin-bottom: 2.5rem;
    animation: glow-pulse 2.5s ease-in-out infinite alternate;
    padding: 0 1rem;
  }

  /* ===== GIFT BOX ===== */
  .gift-wrap {
    cursor: pointer;
    animation: float 2.2s ease-in-out infinite;
    position: relative;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-18px); }
  }

  .gift-box {
    position: relative;
    width: 160px;
    height: 130px;
  }

  .box-body {
    position: absolute;
    bottom: 0;
    width: 160px;
    height: 100px;
    background: linear-gradient(135deg, #e63946, #c1121f);
    border-radius: 6px;
    box-shadow: 6px 6px 0 #8b0000, inset 0 2px 0 rgba(255,255,255,0.2);
    overflow: hidden;
  }
  .box-body::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 22px;
    transform: translateX(-50%);
    background: #fff;
    opacity: 0.9;
    border-radius: 3px;
  }
  .box-body::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 22px;
    transform: translateY(-50%);
    background: #fff;
    opacity: 0.9;
    border-radius: 3px;
  }

  .box-lid {
    position: absolute;
    top: 0;
    width: 160px;
    height: 36px;
    background: linear-gradient(135deg, #ff4d6d, #e63946);
    border-radius: 6px 6px 0 0;
    box-shadow: 5px -4px 0 #8b0000, inset 0 2px 0 rgba(255,255,255,0.25);
    transform-origin: top center;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 5;
  }
  .box-lid::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 22px;
    transform: translateX(-50%);
    background: #fff;
    opacity: 0.9;
  }

  .ribbon-bow {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 36px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .bow-left, .bow-right {
    width: 26px;
    height: 26px;
    background: radial-gradient(circle at 30% 30%, #fff, #eee);
    border-radius: 50% 0 50% 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .bow-right { border-radius: 0 50% 50% 50%; }
  .bow-knot {
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    z-index: 11;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .box-lid.open { transform: rotateX(-130deg); }

  /* ===== STEP 3/4 overlay ===== */
  #celebration {
    background: #000;
    overflow: hidden;
  }

    background-size: cover;
    background-position: center top;
    opacity: 0;
    transform: scale(1.08);
    transition: opacity 1.2s ease, transform 1.5s ease;
    z-index: 1;
    filter: brightness(0.55) saturate(1.2);
  }
  #cel-photo-bg.reveal {
    opacity: 1;
    transform: scale(1);
  }

  /* Gradient overlays on photo */
  #cel-photo-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 30%, transparent 50%, rgba(0,0,0,0.7) 100%),
      linear-gradient(to top, rgba(80,0,60,0.4) 0%, transparent 60%);
  }

  /* Photo frame card */
  .photo-frame {
    position: relative;
    z-index: 10;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 0 0 3px rgba(255,200,80,0.6), 0 0 0 6px rgba(255,100,180,0.3), 0 30px 80px rgba(0,0,0,0.8);
    animation: photo-float 3s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes photo-float {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-10px) rotate(1deg); }
  }
  .photo-frame img {
    display: block;
    width: clamp(160px, 30vw, 240px);
    height: clamp(200px, 40vw, 320px);
    object-fit: cover;
    object-position: center top;
  }

  /* Golden border shimmer */
  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -3px;
    background: conic-gradient(from 0deg, #f7c948, #ff6eb4, #c084fc, #55efc4, #f7c948);
    border-radius: 26px;
    z-index: -1;
    animation: border-spin 4s linear infinite;
  }
  @keyframes border-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .bday-text-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    max-width: 500px;
  }

  #birthday-msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: row;
    flex-wrap: wrap;
    gap: clamp(1.5rem, 4vw, 3rem);
    z-index: 500;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    text-align: center;
    padding: 1.5rem;
  }
  #birthday-msg.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .bday-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(135deg, #f7c948 0%, #ff6eb4 40%, #c084fc 70%, #f7c948 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradient-shift 3s ease infinite, shimmer-text 2s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px rgba(255,200,80,0.6));
    line-height: 1.3;
    margin-bottom: 1rem;
  }
  @keyframes gradient-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes shimmer-text {
    from { filter: drop-shadow(0 0 15px rgba(255,200,80,0.5)) drop-shadow(0 0 30px rgba(255,100,200,0.3)); }
    to   { filter: drop-shadow(0 0 30px rgba(255,200,80,0.9)) drop-shadow(0 0 60px rgba(255,100,200,0.6)) drop-shadow(0 0 90px rgba(200,100,255,0.4)); }
  }

  .bday-sub {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: rgba(255,220,255,0.9);
    text-shadow: 0 0 20px rgba(255,180,255,0.6);
    animation: glow-pulse 2s ease-in-out infinite alternate;
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    opacity: 0;
    pointer-events: none;
    z-index: 300;
    border-radius: 2px;
  }

  /* ===== EMOJI FLOATERS ===== */
  .emoji-float {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 350;
    animation: emoji-rise linear forwards;
    bottom: -60px;
  }
  @keyframes emoji-rise {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* ===== SPARKLE ===== */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 400;
    font-size: 1.2rem;
    animation: sparkle-anim ease-out forwards;
  }
  @keyframes sparkle-anim {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  /* ===== FIREWORK ===== */
  .firework-particle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 320;
    animation: fw-burst linear forwards;
  }
  @keyframes fw-burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { opacity: 0; transform: var(--fw-end) scale(0.3); }
  }

  /* ===== RAINBOW FLASH ===== */
  #rainbow-flash {
    position: fixed;
    inset: 0;
    z-index: 600;
    pointer-events: none;
    opacity: 0;
    animation: none;
  }
  #rainbow-flash.flash {
    animation: rainbow-flash 1.5s ease forwards;
  }
  @keyframes rainbow-flash {
    0%   { opacity: 0; background: #ff0000; }
    14%  { opacity: 0.4; background: #ff7700; }
    28%  { opacity: 0.35; background: #ffff00; }
    42%  { opacity: 0.4; background: #00ff00; }
    57%  { opacity: 0.35; background: #0000ff; }
    71%  { opacity: 0.4; background: #8b00ff; }
    85%  { opacity: 0.3; background: #ff00ff; }
    100% { opacity: 0; background: transparent; }
  }

  /* ===== BG CONFETTI (step2) ===== */
  .bg-confetti {
    position: fixed;
    top: -20px;
    width: 8px;
    height: 16px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 0;
    animation: bg-fall linear infinite;
  }
  @keyframes bg-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0.3; }
  }

  /* ===== STARS ===== */
  .star {
    position: fixed;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: twinkle ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1.4); }
  }
</style>
</head>

<!-- RAINBOW FLASH -->
<div id="rainbow-flash"></div>

<!-- STEP 1 -->
<div class="screen" id="step1">
  <!-- Aurora layers -->
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <div class="aurora aurora-4"></div>

    <div class="bday-text-wrap">
      <div class="bday-text" id="bdayText">Happy Birthday! 🎂</div>
      <div class="bday-sub">Wishing you all the joy in the world 🌟</div>
      <div class="bday-sub" style="font-size:clamp(1rem,3vw,1.4rem); margin-top:0.3rem;">May your day be as amazing as you are! 🥂✨</div>

<script>
  let birthdayName = '';

  // ===== STEP 1 BACKGROUND MAGIC =====
  (function initStep1Bg() {
    const container = document.getElementById('s1-particles');
    const bday = ['🎉','🎀','🎂','✨','🌸','💖','🎊','🌟','🥳','💫','🎈','🍰'];

    // Twinkling stars
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 's1-star';
      const sz = 1 + Math.random() * 3;
      s.style.cssText = `
        left:${Math.random()*100}vw;
        top:${Math.random()*100}vh;
        width:${sz}px; height:${sz}px;
        animation-duration:${1.2+Math.random()*2.8}s;
        animation-delay:${Math.random()*4}s;
        opacity:${0.2+Math.random()*0.8};
      `;
      container.appendChild(s);
    }

    // Floating birthday emojis
    function spawnS1Emoji() {
      const el = document.createElement('div');
      el.className = 's1-emoji';
      el.textContent = bday[Math.floor(Math.random()*bday.length)];
      const sz = 1.2 + Math.random() * 1.4;
      const dur = 12 + Math.random() * 14;
      el.style.cssText = `
        left:${Math.random()*95}vw;
        font-size:${sz}rem;
        animation-duration:${dur}s;
        animation-delay:${Math.random()*5}s;
        filter: drop-shadow(0 0 8px rgba(255,180,255,0.7));
      `;
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 6) * 1000);
    }
    for (let i = 0; i < 18; i++) spawnS1Emoji();
    setInterval(spawnS1Emoji, 3000);

    // Shooting stars
    function spawnShoot() {
      const el = document.createElement('div');
      el.className = 's1-shoot';
      const w = 80 + Math.random() * 160;
      const dur = 1.5 + Math.random() * 2;
      el.style.cssText = `
        top:${Math.random()*60}vh;
        left:0;
        width:${w}px;
        animation-duration:${dur}s;
        animation-delay:${Math.random()*2}s;
        opacity:0;
      `;
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 3) * 1000);
    }
    for (let i = 0; i < 5; i++) spawnShoot();
    setInterval(spawnShoot, 2500);

    // Sparkle rings
    function spawnRing() {
      const el = document.createElement('div');
      el.className = 's1-ring';
      const sz = 20 + Math.random() * 40;
      const dur = 2 + Math.random() * 2;
      const colors = ['255,110,180','192,132,252','247,201,72','86,205,196'];
      const c = colors[Math.floor(Math.random()*colors.length)];
      el.style.cssText = `
        left:${Math.random()*95}vw;
        top:${Math.random()*90}vh;
        width:${sz}px; height:${sz}px;
        border-color: rgba(${c},0.6);
        animation-duration:${dur}s;
        animation-delay:${Math.random()*1}s;
        box-shadow: 0 0 8px rgba(${c},0.4);
      `;
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 2) * 1000);
    }
    for (let i = 0; i < 12; i++) setTimeout(spawnRing, i * 400);
    setInterval(spawnRing, 800);
  })();

  // ===== STEP 1 → 2 =====
  function goToStep2() {
    const val = document.getElementById('nameInput').value.trim();
    birthdayName = val || 'You';
    document.getElementById('step1').classList.add('hidden');
    const s2 = document.getElementById('step2');
    s2.classList.remove('hidden');
    spawnBgConfetti();
    spawnStars();
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') goToStep2();
  });

  // ===== BG CONFETTI for step2 =====
  function spawnBgConfetti() {
    const colors = ['#ff6eb4','#c084fc','#f7c948','#55efc4','#ff7675','#74b9ff','#fd79a8','#a29bfe'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div');
      el.className = 'bg-confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (4 + Math.random() * 6) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (10 + Math.random() * 14) + 'px';
      el.style.opacity = 0.6 + Math.random() * 0.4;
      document.getElementById('step2').appendChild(el);
    }
  }

  function spawnStars() {
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.animationDuration = (1 + Math.random() * 3) + 's';
      star.style.animationDelay = (Math.random() * 3) + 's';
      star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
      document.getElementById('step2').appendChild(star);
    }
  }

  // ===== GIFT OPEN =====
  let gifted = false;
  function openGift() {
    if (gifted) return;
    gifted = true;

    document.getElementById('boxLid').classList.add('open');
    document.getElementById('giftWrap').style.animation = 'none';

    document.getElementById('step2').classList.add('hidden');
    const cel = document.getElementById('celebration');
    cel.classList.remove('hidden');

    // Reveal photo background
    setTimeout(() => {
      document.getElementById('cel-photo-bg').classList.add('reveal');
    }, 100);

    // Celebrations
    triggerRainbowFlash();
    spawnCelebrationConfetti();
    spawnEmojiFloaters();
    spawnSparkles();
    scheduleFireworks();

    // Birthday message after 1s
    document.getElementById('bdayText').textContent = `Happy Birthday ${birthdayName}! 🎂`;
    setTimeout(() => {
      document.getElementById('birthday-msg').classList.add('show');
    }, 1000);

    // Keep spawning more confetti waves
    setTimeout(spawnCelebrationConfetti, 800);
    setTimeout(spawnCelebrationConfetti, 1600);
    setTimeout(spawnEmojiFloaters, 1200);
    setTimeout(spawnSparkles, 500);
    setTimeout(spawnSparkles, 1500);
    setTimeout(scheduleFireworks, 2000);
  }

  // ===== RAINBOW FLASH =====
  function triggerRainbowFlash() {
    const el = document.getElementById('rainbow-flash');
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  // ===== CELEBRATION CONFETTI (150+ pieces) =====
  function spawnCelebrationConfetti() {
    const colors = ['#ff6eb4','#c084fc','#f7c948','#55efc4','#ff7675','#74b9ff','#fd79a8','#a29bfe','#ff9f43','#00cec9','#e17055','#6c5ce7'];
    const shapes = ['2px','50%','0'];
    for (let i = 0; i < 160; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const size = 6 + Math.random() * 12;
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: ${-10 - Math.random() * 20}px;
        width: ${size}px;
        height: ${size * (0.5 + Math.random())}px;
        background: ${color};
        border-radius: ${shape};
        transform: rotate(${Math.random() * 360}deg);
      `;
      document.getElementById('celebration').appendChild(el);
      animateConfettiPiece(el);
    }
  }

  function animateConfettiPiece(el) {
    const startX = parseFloat(el.style.left);
    const duration = 2000 + Math.random() * 3000;
    const delay = Math.random() * 1000;
    const swingAmt = 80 + Math.random() * 120;
    const swingFreq = 1 + Math.random() * 2;
    let start = null;

    setTimeout(() => {
      el.style.opacity = '1';
      function frame(ts) {
        if (!start) start = ts;
        const t = (ts - start) / duration;
        if (t >= 1) { el.remove(); return; }
        const y = t * 110;
        const x = startX + Math.sin(t * Math.PI * swingFreq * 2) * swingAmt;
        const rot = t * 720 * (Math.random() > 0.5 ? 1 : -1);
        const op = t < 0.8 ? 1 : (1 - (t - 0.8) / 0.2);
        el.style.top = y + 'vh';
        el.style.left = x + 'px';
        el.style.transform = `rotate(${rot}deg)`;
        el.style.opacity = op;
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }, delay);
  }

  // ===== EMOJI FLOATERS =====
  const EMOJIS = ['🎂','🍫','🎁','🎊','🎈','🧁','🍰','🎆','🎇','🥳','✨','🌟','💫','🎀'];
  function spawnEmojiFloaters() {
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'emoji-float';
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      el.style.left = (Math.random() * 95) + 'vw';
      el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
      const dur = 3 + Math.random() * 3;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      document.getElementById('celebration').appendChild(el);
      setTimeout(() => el.remove(), (dur + 2) * 1000);
    }
  }

  // ===== SPARKLE PARTICLES =====
  function spawnSparkles() {
    const chars = ['✨','💥','⭐','🌟','💛','💖','💜'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = chars[Math.floor(Math.random() * chars.length)];
      el.style.left = (Math.random() * 95) + 'vw';
      el.style.top = (Math.random() * 90) + 'vh';
      el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
      const dur = 0.8 + Math.random() * 1.2;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 1) + 's';
      document.getElementById('celebration').appendChild(el);
      setTimeout(() => el.remove(), (dur + 1.5) * 1000);
    }
  }

  // ===== FIREWORKS =====
  const FW_COLORS = ['#f7c948','#ff6eb4','#55efc4','#74b9ff','#c084fc','#ff7675','#fff'];
  function spawnFirework(cx, cy) {
    const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
    const count = 20 + Math.floor(Math.random() * 20);
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const dist = 80 + Math.random() * 140;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const el = document.createElement('div');
      el.className = 'firework-particle';
      el.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        background: ${color};
        width: ${3 + Math.random() * 5}px;
        height: ${3 + Math.random() * 5}px;
        --fw-end: translate(${dx}px, ${dy}px);
        animation-duration: ${0.6 + Math.random() * 0.8}s;
        animation-delay: ${Math.random() * 0.3}s;
        box-shadow: 0 0 6px ${color};
      `;
      document.getElementById('celebration').appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }
  }

  function scheduleFireworks() {
    const positions = [
      [window.innerWidth * 0.2, window.innerHeight * 0.25],
      [window.innerWidth * 0.8, window.innerHeight * 0.2],
      [window.innerWidth * 0.5, window.innerHeight * 0.35],
      [window.innerWidth * 0.15, window.innerHeight * 0.6],
      [window.innerWidth * 0.85, window.innerHeight * 0.55],
      [window.innerWidth * 0.4, window.innerHeight * 0.15],
      [window.innerWidth * 0.65, window.innerHeight * 0.45],
    ];
    positions.forEach(([x, y], i) => {
      setTimeout(() => spawnFirework(x, y), i * 220);
    });
  }
</script>
</body>
